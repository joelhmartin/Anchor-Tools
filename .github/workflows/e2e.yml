name: E2E (Playwright + wp-env)

# This workflow is fully self-contained: it stands up its own WordPress +
# WooCommerce environment via @wordpress/env (Docker) on the runner, so NO
# external/staging environment is needed. It does not touch the PHPUnit
# workflow (tests.yml).

on:
  push:
  pull_request:

jobs:
  e2e:
    name: Purchase happy path
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        run: npm install

      - name: Install Playwright (chromium + system deps)
        run: npx playwright install --with-deps chromium

      # Docker is preinstalled on ubuntu-latest; wp-env uses it to boot WP+WC.
      - name: Start wp-env (WordPress + WooCommerce)
        run: npm run wp-env start

      - name: Wait for WordPress to respond
        run: |
          for i in $(seq 1 60); do
            if curl -sSf -o /dev/null http://localhost:8888/; then
              echo "WordPress is up."
              exit 0
            fi
            echo "Waiting for http://localhost:8888 ... ($i)"
            sleep 5
          done
          echo "WordPress did not come up in time." >&2
          exit 1

      - name: Seed the site (checkout-ready + paid event fixture)
        run: npm run env:seed

      - name: Run Playwright E2E tests
        run: npm run test:e2e

      - name: Show WP debug log (on failure)
        if: failure()
        run: npx wp-env run cli cat wp-content/debug.log || echo "(no debug.log)"

      - name: Stop wp-env
        if: always()
        run: npx wp-env stop

      - name: Upload Playwright report + seed fixture
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            e2e/.seed.json
          retention-days: 7
          if-no-files-found: ignore
